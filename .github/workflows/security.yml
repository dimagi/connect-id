name: Security Audit

on:
  pull_request:
    branches: ['main']
    paths:
      - 'pyproject.toml'
      - 'uv.lock'

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Export production requirements
        run: uv export --format requirements-txt --no-dev -o /tmp/requirements.txt

      - name: Run pip-audit
        run: uvx pip-audit -r /tmp/requirements.txt
