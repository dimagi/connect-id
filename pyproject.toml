[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "connectid.settings"
addopts = "--reuse-db"
python_files = [
    "tests.py",
    "test_*.py",
]

# ==== ruff ====
[tool.ruff]
line-length = 119
target-version = "py311"
extend-exclude = ["**/migrations/*.py"]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes (flake8 defaults), I: isort
select = ["E", "W", "F", "I"]

[tool.ruff.lint.isort]
# Matches the previous isort "black" profile behaviour.
known-first-party = ["connectid"]

# ==== PyLint ====
[tool.pylint.MASTER]
load-plugins = [
    "pylint_django",
    "pylint_celery",
]
django-settings-module = "connectid.settings"

[tool.pylint.FORMAT]
max-line-length = 119

[tool.pylint."MESSAGES CONTROL"]
disable = [
    "missing-docstring",
    "invalid-name",
]

[tool.pylint.DESIGN]
max-parents = 13

[tool.pylint.TYPECHECK]
generated-members = [
    "REQUEST",
    "acl_users",
    "aq_parent",
    "[a-zA-Z]+_set{1,2}",
    "save",
    "delete",
]
