[project]
name = "connectid"
version = "0.0.1"
requires-python = "==3.11.*"
dependencies = [
    "boto3==1.43.25",
    "celery==5.6.3",
    "django==4.1.7",
    "django-allow-cidr==0.7.1",
    "django-anymail[amazon-ses]>=14.0",
    "django-axes[ipware]==6.0.3",
    "django-celery-beat==2.9.0",
    "django-environ==0.13.0",
    "django-oauth-toolkit==2.3.0",
    "django-otp==1.5.4",
    "django-phonenumber-field==7.0.2",
    "django-waffle==4.2.0",
    "djangorestframework==3.15.1",
    "fcm-django==2.2.1",
    "geopy==2.4.1",
    "google-api-python-client==2.197.0",
    "google-auth==2.53.0",
    "google-cloud-bigquery>=3.25.0",
    "gunicorn==26.0.0",
    "phonenumberslite==9.0.32",
    "psycopg2==2.9.12",
    "redis==8.0.0",
    "sentry-sdk[django]==2.62.0",
    "twilio==9.10.9",
    "whitenoise==6.12.0",
    "zxcvbn==4.5.0",
]

[dependency-groups]
dev = [
    "factory-boy==3.3.3",
    "pre-commit==4.6.0",
    "pytest==9.0.3",
    "pytest-cov==7.1.0",
    "pytest-django==4.12.0",
    "ruff>=0.15.18",
]

[tool.uv]
package = false
# Pin transitive dependencies to the versions previously locked by pip-compile so
# the migration to uv reproduces the existing environment exactly. Direct deps are
# pinned in [project.dependencies] / [dependency-groups]. Relax/remove as deps are
# intentionally upgraded.
constraint-dependencies = [
